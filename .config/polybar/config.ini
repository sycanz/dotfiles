; Colorscheme
include-file = ~/.config/polybar/colorscheme/catppuccin-mocha.ini

; Theme
include-directory = ~/.config/polybar/themes/catppuccin-mocha

; Options: 
wm-restack = i3

[bar/top]
monitor = ${env:MONITOR:}

width = 100%
height = 30

; background=${colors.base}
background= #cc1e1e2e
foreground=${colors.peach}

tray-position = left

; Font file
include-file = fonts.ini

; Set enabled modules
include-file = ~/.config/polybar/enabled-modules.ini

; override-redirect = true
[settings]
screenchange-reload = true
pseudo-transparency = true
