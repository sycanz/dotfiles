[module/i3]
type = internal/i3
index-sort = true
pin-workspaces = true

format = <label-state>
format-padding = 0

ws-icon-0 = 1;󰆍
ws-icon-1 = 2;󰈹
ws-icon-2 = 3;󰅩
ws-icon-3 = 4;󰍡
ws-icon-4 = 5;󰝚
ws-icon-default = 󰍹

; Focused workspace
label-focused = %{T1} %index% %icon% %{T-}
label-focused-background = ${colors.mauve}
label-focused-foreground = ${colors.crust}

; Occupied workspace
label-occupied = %{T1} %index% %icon% %{T-}
label-occupied-background = ${colors.surface0}
label-occupied-foreground = ${colors.text}

; Empty workspace
label-empty = %{T1} %index% %icon% %{T-}
label-empty-background = ${colors.base}
label-empty-foreground = ${colors.overlay1}

; Urgent workspace
label-urgent = %{T1} %index% %icon% %{T-}
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.crust}
